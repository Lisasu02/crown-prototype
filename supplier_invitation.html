<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Add Suppliers to Event — CROWN</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #F5F3EE; padding: 32px 20px; min-height: 100vh; }
.wrap { max-width: 720px; margin: 0 auto; }

.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.header-title { font-size: 20px; font-weight: 800; color: #111; }
.crown-logo { font-size: 15px; font-weight: 800; letter-spacing: 0.1em; color: #111; }
.crown-logo span { color: #1E8A3A; }

.role-tabs { display: flex; background: #fff; border: 1px solid #E0DDD6; border-radius: 10px; padding: 4px; margin-bottom: 20px; gap: 4px; }
.rtab { flex: 1; padding: 9px; border: none; background: transparent; font-size: 13px; font-weight: 600; color: #888; border-radius: 7px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.rtab.on { background: #1E8A3A; color: #fff; }

.card { background: #fff; border: 1px solid #E0DDD6; border-radius: 14px; padding: 20px; margin-bottom: 14px; }
.ctitle { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 3px; }
.csub { font-size: 12px; color: #888; margin-bottom: 16px; line-height: 1.5; }

.search-row { display: flex; gap: 10px; align-items: center; }
.sinput { flex: 1; padding: 10px 14px; border: 1px solid #E0DDD6; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; background: #F9F8F5; transition: border 0.15s; }
.sinput:focus { border-color: #1E8A3A; background: #fff; }

.btn { padding: 10px 18px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; transition: all 0.15s; white-space: nowrap; }
.btn-p { background: #1E8A3A; color: #fff; }
.btn-p:hover { background: #166B2D; }
.btn-p:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-s { background: #fff; color: #111; border: 1px solid #E0DDD6; }
.btn-s:hover { background: #F5F3EE; }
.btn-add { background: #E8F5E9; color: #1E8A3A; border: 1px solid #C8E6C9; padding: 6px 14px; font-size: 11px; }
.btn-add:hover { background: #C8E6C9; }
.btn-sm { padding: 6px 14px; font-size: 11px; }
.btn-loading { position: relative; pointer-events: none; }
.btn-loading::after { content: ''; position: absolute; width: 12px; height: 12px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; right: 10px; top: 50%; margin-top: -6px; }
@keyframes spin { to { transform: rotate(360deg); } }

.results { margin-top: 12px; }
.results-title { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: #BBB; margin-bottom: 8px; }
.rlist { border: 1px solid #E0DDD6; border-radius: 8px; overflow-y: auto; max-height: 280px; }
.ritem { padding: 10px 14px; border-bottom: 1px solid #F0EDE8; display: flex; justify-content: space-between; align-items: center; transition: background 0.1s; }
.ritem:last-child { border-bottom: none; }
.ritem:hover { background: #F5FBF6; }
.ritem-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.ravatar { width: 32px; height: 32px; border-radius: 50%; background: #D6EAD9; color: #1E8A3A; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
.ritem-text { min-width: 0; }
.ritem-name { font-size: 13px; font-weight: 600; color: #111; }
.ritem-detail { font-size: 11px; color: #888; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ritem-co { font-size: 10px; color: #AAA; margin-top: 1px; }

.no-results { padding: 16px; text-align: center; }
.no-results-text { font-size: 12px; color: #888; margin-bottom: 10px; }
.no-results-query { font-weight: 700; color: #555; }

.warn-inline { background: #FFFDE7; border: 1px solid #FFD54F; border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #7B5E00; margin-top: 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }

/* Invite panel */
.invite-panel { border: 1px solid #E0DDD6; border-radius: 10px; padding: 18px; margin-top: 14px; background: #FAFDF9; }
.invite-panel-title { font-size: 13px; font-weight: 700; color: #1E8A3A; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
.invite-close { background: none; border: none; font-size: 16px; color: #AAA; cursor: pointer; padding: 0 4px; }
.invite-close:hover { color: #555; }
.fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.flabel { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #888; }
.finput { padding: 9px 12px; border: 1px solid #E0DDD6; border-radius: 7px; font-size: 13px; font-family: inherit; outline: none; background: #fff; width: 100%; transition: border 0.15s; }
.finput:focus { border-color: #1E8A3A; }
.finput.invalid { border-color: #E53935; background: #FFF5F5; }
.field-error { font-size: 10px; color: #E53935; margin-top: -6px; margin-bottom: 8px; }
.fselect { padding: 9px 12px; border: 1px solid #E0DDD6; border-radius: 7px; font-size: 13px; font-family: inherit; outline: none; background: #F9F8F5; width: 100%; }
.invite-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }

/* Link result after invite */
.link-result { background: #F5F3EE; border: 1px solid #E0DDD6; border-radius: 8px; padding: 10px 14px; margin-top: 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 11px; font-family: monospace; color: #888; }
.link-result-url { flex: 1; word-break: break-all; line-height: 1.5; }
.copy-btn { flex-shrink: 0; padding: 6px 14px; border: 1px solid #E0DDD6; border-radius: 6px; background: #fff; font-size: 11px; font-weight: 700; color: #1E8A3A; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.copy-btn:hover { background: #E8F5E9; }
.copy-btn.copied { background: #1E8A3A; color: #fff; border-color: #1E8A3A; }

/* Added suppliers list */
.added-card { margin-top: 14px; }
.added-title { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: #888; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.added-count { background: #1E8A3A; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 999px; }
.added-list { }
.added-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #F0EDE8; }
.added-item:last-child { border-bottom: none; }
.added-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.added-icon.existing { background: #E8F5E9; color: #1E8A3A; }
.added-icon.pending { background: #FFF3E0; color: #E65100; }
.added-info { flex: 1; min-width: 0; }
.added-name { font-size: 13px; font-weight: 600; color: #111; }
.added-detail { font-size: 11px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.added-badge { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
.added-badge.existing { background: #E8F5E9; color: #1E8A3A; }
.added-badge.pending { background: #FFF3E0; color: #E65100; }
.added-remove { background: none; border: none; font-size: 14px; color: #CCC; cursor: pointer; padding: 4px 6px; border-radius: 4px; transition: all 0.12s; }
.added-remove:hover { color: #E53935; background: #FFF5F5; }

.empty-state { text-align: center; padding: 20px; color: #CCC; font-size: 12px; }

.infobox { background: #E8F5E9; border: 1px solid #A8D5B5; border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #1B5E2F; margin-bottom: 14px; line-height: 1.5; }

.flash { animation: flashIn 0.4s ease; }
@keyframes flashIn { 0% { background: #C8E6C9; } 100% { background: transparent; } }

@media (max-width: 520px) {
  .fg2 { grid-template-columns: 1fr; gap: 8px; }
  .search-row { flex-direction: column; }
  .search-row .btn { width: 100%; text-align: center; }
  .link-result { flex-direction: column; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-title">Add Suppliers to Event</div>
    <div class="crown-logo">CR<span>&#9650;</span>WN</div>
  </div>
  <div class="role-tabs">
    <button class="rtab on" id="tab-admin" onclick="switchRole('admin')">Admin view</button>
    <button class="rtab" id="tab-buyer" onclick="switchRole('buyer')">Buyer view</button>
  </div>
  <div id="main"></div>
</div>

<script>
// ── DATA ──
var companies = [
  { id:1, name:'CROWN Procurement', country:'France',
    contacts:[
      {id:11, name:'Alice Martin', email:'alice.martin@crown.com', initials:'AM'},
      {id:12, name:'Thomas Dupont', email:'t.dupont@crown.com', initials:'TD'}
    ]
  },
  { id:2, name:'Acme Supplies', country:'Germany',
    contacts:[{id:21, name:'Hans M\u00FCller', email:'h.muller@acme.de', initials:'HM'}]
  },
  { id:3, name:'Global Logistics SA', country:'Spain', contacts:[] },
  { id:4, name:'Maersk', country:'Denmark',
    contacts:[
      {id:41, name:'Erik Jensen', email:'e.jensen@maersk.com', initials:'EJ'},
      {id:42, name:'Sofia Andersen', email:'s.andersen@maersk.com', initials:'SA'},
      {id:43, name:'Lars Nielsen', email:'l.nielsen@maersk.com', initials:'LN'}
    ]
  },
  { id:5, name:'Cargill', country:'United States', contacts:[{id:51, name:'Mike Ross', email:'m.ross@cargill.com', initials:'MR'}] },
  { id:6, name:'BASF', country:'Germany', contacts:[{id:61, name:'Anna Weber', email:'a.weber@basf.de', initials:'AW'},{id:62, name:'Klaus Schmidt', email:'k.schmidt@basf.de', initials:'KS'}] },
  { id:7, name:'Nestl\u00E9', country:'Switzerland', contacts:[{id:71, name:'Pierre Blanc', email:'p.blanc@nestle.com', initials:'PB'}] },
  { id:8, name:'Unilever', country:'Netherlands', contacts:[{id:81, name:'Jan de Vries', email:'j.devries@unilever.com', initials:'JV'},{id:82, name:'Emma Bakker', email:'e.bakker@unilever.com', initials:'EB'}] },
  { id:9, name:'Danone', country:'France', contacts:[{id:91, name:'Claire Dubois', email:'c.dubois@danone.com', initials:'CD'}] },
  { id:10, name:'Bayer', country:'Germany', contacts:[] },
  { id:11, name:'Syngenta', country:'Switzerland', contacts:[{id:111, name:'Marco Rossi', email:'m.rossi@syngenta.com', initials:'MR'}] },
  { id:12, name:'ADM (Archer Daniels Midland)', country:'United States', contacts:[{id:121, name:'Sarah Miller', email:'s.miller@adm.com', initials:'SM'},{id:122, name:'Tom Brown', email:'t.brown@adm.com', initials:'TB'}] },
  { id:13, name:'Louis Dreyfus Company', country:'France', contacts:[{id:131, name:'Jean Moreau', email:'j.moreau@ldc.com', initials:'JM'}] },
  { id:14, name:'Olam International', country:'Singapore', contacts:[] },
  { id:15, name:'Barry Callebaut', country:'Switzerland', contacts:[{id:151, name:'Lukas M\u00FCller', email:'l.muller@barry-callebaut.com', initials:'LM'}] },
  { id:16, name:'Kerry Group', country:'Ireland', contacts:[{id:161, name:'Liam Murphy', email:'l.murphy@kerry.com', initials:'LM'},{id:162, name:'Aoife Kelly', email:'a.kelly@kerry.com', initials:'AK'}] },
  { id:17, name:'DSM-Firmenich', country:'Netherlands', contacts:[{id:171, name:'Daan Jansen', email:'d.jansen@dsm.com', initials:'DJ'}] },
  { id:18, name:'Symrise', country:'Germany', contacts:[{id:181, name:'Felix Wagner', email:'f.wagner@symrise.com', initials:'FW'}] }
];
var buyers = ['Bonduelle','Safran','Kiabi'];

// ── STATE ──
var role = 'admin';
var query = '';
var eventSuppliers = []; // { id, name, email, company, initials, isNew, inviteToken }
var showInvitePanel = false;
var invNewCoMode = false; // creating new company in invite panel
var invCoId = '';
var invNewCoName = '';
var invNewCoCountry = '';
var invName = '';
var invEmail = '';
var invBuyer = '';
var invSending = false;
var invDone = false;
var invToken = '';
var lastAddedId = null;
var emailTouched = false;

// ── HELPERS ──
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
function getInitials(name) { var p=name.trim().split(/\s+/); return p.length>1 ? (p[0][0]+p[p.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase(); }

function isAlreadyAdded(email) {
  return eventSuppliers.some(function(s){ return s.email.toLowerCase() === email.toLowerCase(); });
}

// ── SEARCH ──
function searchResults() {
  if (query.length < 2) return [];
  var q = query.toLowerCase();
  var results = [];
  companies.forEach(function(co) {
    co.contacts.forEach(function(c) {
      if (c.name.toLowerCase().indexOf(q) > -1 ||
          c.email.toLowerCase().indexOf(q) > -1 ||
          co.name.toLowerCase().indexOf(q) > -1) {
        if (!isAlreadyAdded(c.email)) {
          results.push({ id: c.id, name: c.name, email: c.email, initials: c.initials, company: co.name, country: co.country });
        }
      }
    });
  });
  return results;
}

// ── ACTIONS ──
function addSupplier(contactId) {
  var result = null;
  companies.forEach(function(co) {
    co.contacts.forEach(function(c) {
      if (c.id === contactId) result = { id: c.id, name: c.name, email: c.email, initials: c.initials, company: co.name, isNew: false };
    });
  });
  if (result && !isAlreadyAdded(result.email)) {
    eventSuppliers.push(result);
    lastAddedId = result.id;
    query = '';
    draw();
    setTimeout(function() { lastAddedId = null; }, 600);
    var si = document.getElementById('search-input');
    if (si) si.focus();
  }
}

function removeSupplier(idx) {
  eventSuppliers.splice(idx, 1);
  draw();
}

function openInvitePanel() {
  showInvitePanel = true;
  invNewCoMode = false; invCoId = ''; invNewCoName = ''; invNewCoCountry = '';
  invName = ''; invEmail = query.indexOf('@') > -1 ? query : '';
  invBuyer = ''; invSending = false; invDone = false; invToken = ''; emailTouched = false;
  draw();
}

function closeInvitePanel() {
  showInvitePanel = false; invDone = false; invToken = '';
  draw();
  var si = document.getElementById('search-input');
  if (si) si.focus();
}

function toggleNewCoMode() {
  invNewCoMode = !invNewCoMode;
  invCoId = ''; invNewCoName = ''; invNewCoCountry = '';
  draw();
}

function submitInvite() {
  invSending = true; draw();
  setTimeout(function() {
    invSending = false;
    invToken = Math.random().toString(36).substr(2, 12);
    var coName = invNewCoMode ? invNewCoName : (companies.find(function(c){return c.id==invCoId;}) || {}).name || 'Unknown';
    eventSuppliers.push({
      id: 'inv-' + invToken,
      name: invName || invEmail,
      email: invEmail,
      initials: invName ? getInitials(invName) : '??',
      company: coName,
      isNew: true,
      inviteToken: invToken
    });
    invDone = true;
    query = '';
    lastAddedId = 'inv-' + invToken;
    draw();
    setTimeout(function() { lastAddedId = null; }, 600);
  }, 1000);
}

function canSubmitInvite() {
  if (!isValidEmail(invEmail)) return false;
  if (invNewCoMode && !invNewCoName.trim()) return false;
  if (!invNewCoMode && !invCoId) return false;
  if (role === 'admin' && (invNewCoMode) && !invBuyer) return false;
  if (isAlreadyAdded(invEmail)) return false;
  return true;
}

function copyInvLink() {
  var coName = invNewCoMode ? invNewCoName : (companies.find(function(c){return c.id==invCoId;}) || {}).name || '';
  var link = 'https://app.crown.com/invite/' + invToken + '?role=supplier&company=' + encodeURIComponent(coName);
  navigator.clipboard.writeText(link).then(function() {
    var btn = document.getElementById('copy-inv-btn');
    if (btn) { btn.textContent = 'Copied!'; btn.className = 'copy-btn copied'; }
    setTimeout(function() {
      var btn = document.getElementById('copy-inv-btn');
      if (btn) { btn.textContent = 'Copy link'; btn.className = 'copy-btn'; }
    }, 2000);
  });
}

function switchRole(r) {
  if (r === role) return;
  role = r;
  document.getElementById('tab-admin').className = 'rtab' + (r === 'admin' ? ' on' : '');
  document.getElementById('tab-buyer').className = 'rtab' + (r === 'buyer' ? ' on' : '');
  draw();
}

// ── SEARCH INPUT (debounced) ──
var searchTimer = null;
function setQuery(v) {
  query = v;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() { draw(); }, 120);
}

// ── FOCUS SAVE/RESTORE ──
function saveFocus() {
  var el = document.activeElement;
  if (!el || !el.id) return null;
  return { id: el.id, start: el.selectionStart, end: el.selectionEnd };
}
function restoreFocus(info) {
  if (!info) return;
  var el = document.getElementById(info.id);
  if (!el) return;
  el.focus();
  if (typeof el.setSelectionRange === 'function' && info.start != null) {
    try { el.setSelectionRange(info.start, info.end); } catch(e) {}
  }
}

// ── DRAW ──
function draw() {
  var focusInfo = saveFocus();
  var isAdmin = role === 'admin';
  var results = searchResults();
  var hasQuery = query.length >= 2;
  var h = '';

  // Buyer info
  if (!isAdmin) {
    h += '<div class="infobox">Adding suppliers on behalf of <strong>Bonduelle</strong>.</div>';
  }

  // ─── SEARCH CARD ───
  h += '<div class="card">';
  h += '<div class="ctitle">Search & add suppliers</div>';
  h += '<div class="csub">Paste an email address or type a name to find existing suppliers. Add them to the event with one click.</div>';

  h += '<div class="search-row">';
  h += '<input class="sinput" id="search-input" placeholder="Paste email or search by name / company..." value="' + esc(query) + '" oninput="setQuery(this.value)" />';
  h += '<button class="btn btn-s btn-sm" onclick="openInvitePanel()">+ Create company</button>';
  h += '</div>';

  // Results
  if (hasQuery && results.length > 0) {
    h += '<div class="results">';
    h += '<div class="results-title">' + results.length + ' supplier' + (results.length !== 1 ? 's' : '') + ' found</div>';
    h += '<div class="rlist">';
    results.forEach(function(r) {
      h += '<div class="ritem">';
      h += '<div class="ritem-info">';
      h += '<div class="ravatar">' + r.initials + '</div>';
      h += '<div class="ritem-text">';
      h += '<div class="ritem-name">' + esc(r.name) + '</div>';
      h += '<div class="ritem-detail">' + esc(r.email) + '</div>';
      h += '<div class="ritem-co">' + esc(r.company) + ' \u00B7 ' + esc(r.country) + '</div>';
      h += '</div></div>';
      h += '<button class="btn btn-add" onclick="addSupplier(' + r.id + ')">+ Add</button>';
      h += '</div>';
    });
    h += '</div></div>';
  } else if (hasQuery && results.length === 0) {
    h += '<div class="warn-inline">';
    h += '<div><strong>No supplier found</strong> matching \u201C' + esc(query) + '\u201D</div>';
    if (!showInvitePanel) {
      h += '<button class="btn btn-p btn-sm" onclick="openInvitePanel()">Invite new supplier \u2192</button>';
    }
    h += '</div>';
  }

  // ─── INVITE PANEL ───
  if (showInvitePanel) {
    h += '<div class="invite-panel">';
    if (invDone) {
      // Success state
      h += '<div class="invite-panel-title">Invitation link ready <button class="invite-close" onclick="closeInvitePanel()">\u2715</button></div>';
      h += '<div style="font-size:12px;color:#555;margin-bottom:10px;">Share this link with <strong>' + esc(invEmail) + '</strong> to invite them.</div>';
      var coName = invNewCoMode ? invNewCoName : (companies.find(function(c){return c.id==invCoId;}) || {}).name || '';
      h += '<div class="link-result">';
      h += '<span class="link-result-url">https://app.crown.com/invite/' + invToken + '?role=supplier&company=' + encodeURIComponent(coName) + '</span>';
      h += '<button class="copy-btn" id="copy-inv-btn" onclick="copyInvLink()">Copy link</button>';
      h += '</div>';
      h += '<div style="margin-top:12px;text-align:right;">';
      h += '<button class="btn btn-s btn-sm" onclick="closeInvitePanel()">Done \u2014 continue adding</button>';
      h += '</div>';
    } else {
      // Form state
      h += '<div class="invite-panel-title">Invite a new supplier <button class="invite-close" onclick="closeInvitePanel()">\u2715</button></div>';

      // Company selection
      if (!invNewCoMode) {
        h += '<div class="fg"><label class="flabel">Supplier company</label>';
        h += '<select class="fselect" id="inv-co-select" onchange="invCoId=this.value;draw()">';
        h += '<option value="">Select existing company...</option>';
        companies.forEach(function(co) {
          h += '<option value="' + co.id + '"' + (invCoId == co.id ? ' selected' : '') + '>' + esc(co.name) + '</option>';
        });
        h += '</select></div>';
        h += '<button style="background:none;border:none;color:#1E8A3A;font-size:11px;font-weight:700;cursor:pointer;margin-top:-6px;margin-bottom:12px;font-family:inherit;" onclick="toggleNewCoMode()">+ Create a new company instead</button>';
      } else {
        h += '<div class="fg2">';
        h += '<div class="fg"><label class="flabel">New company name</label><input class="finput" id="inv-co-name" placeholder="Legal company name" value="' + esc(invNewCoName) + '" oninput="invNewCoName=this.value" /></div>';
        h += '<div class="fg"><label class="flabel">Country</label><input class="finput" id="inv-co-country" placeholder="Country" value="' + esc(invNewCoCountry) + '" oninput="invNewCoCountry=this.value" /></div>';
        h += '</div>';
        h += '<button style="background:none;border:none;color:#1E8A3A;font-size:11px;font-weight:700;cursor:pointer;margin-top:-6px;margin-bottom:12px;font-family:inherit;" onclick="toggleNewCoMode()">\u2190 Select existing company</button>';
      }

      // Buyer assignment (admin + new company only)
      if (isAdmin && invNewCoMode) {
        h += '<div class="fg"><label class="flabel">Assign to buyer company</label>';
        h += '<select class="fselect" id="inv-buyer" onchange="invBuyer=this.value;draw()">';
        h += '<option value="">Select buyer...</option>';
        buyers.forEach(function(b) { h += '<option value="' + b + '"' + (invBuyer === b ? ' selected' : '') + '>' + b + '</option>'; });
        h += '</select></div>';
      }

      // Contact details
      h += '<div class="fg2">';
      h += '<div class="fg"><label class="flabel">Contact name</label><input class="finput" id="inv-name" placeholder="Jane Smith" value="' + esc(invName) + '" oninput="invName=this.value" /></div>';
      var emailInvalid = emailTouched && invEmail && !isValidEmail(invEmail);
      h += '<div class="fg"><label class="flabel">Email address</label><input class="finput' + (emailInvalid ? ' invalid' : '') + '" id="inv-email" type="email" placeholder="jane@supplier.com" value="' + esc(invEmail) + '" oninput="invEmail=this.value;emailTouched=true" /></div>';
      h += '</div>';
      if (emailInvalid) h += '<div class="field-error">Please enter a valid email address.</div>';
      if (isAlreadyAdded(invEmail) && invEmail) h += '<div class="field-error">This email has already been added to the event.</div>';

      h += '<div class="invite-actions">';
      h += '<button class="btn btn-s btn-sm" onclick="closeInvitePanel()">Cancel</button>';
      h += '<button class="btn btn-p btn-sm' + (invSending ? ' btn-loading' : '') + '" ' + (canSubmitInvite() && !invSending ? '' : 'disabled') + ' onclick="submitInvite()">' + (invSending ? 'Generating...  ' : 'Generate invitation link') + '</button>';
      h += '</div>';
    }
    h += '</div>';
  }

  h += '</div>'; // end search card

  // ─── ADDED SUPPLIERS LIST ───
  h += '<div class="card added-card">';
  h += '<div class="added-title">Suppliers added to event ';
  if (eventSuppliers.length > 0) h += '<span class="added-count">' + eventSuppliers.length + '</span>';
  h += '</div>';

  if (eventSuppliers.length === 0) {
    h += '<div class="empty-state">No suppliers added yet. Use the search bar above to find and add suppliers.</div>';
  } else {
    h += '<div class="added-list">';
    eventSuppliers.forEach(function(s, idx) {
      var isFlash = lastAddedId && lastAddedId === s.id;
      h += '<div class="added-item' + (isFlash ? ' flash' : '') + '">';
      h += '<div class="added-icon ' + (s.isNew ? 'pending' : 'existing') + '">' + (s.isNew ? '\uD83D\uDD17' : '\u2713') + '</div>';
      h += '<div class="added-info">';
      h += '<div class="added-name">' + esc(s.name) + '</div>';
      h += '<div class="added-detail">' + esc(s.email) + ' \u00B7 ' + esc(s.company) + '</div>';
      h += '</div>';
      h += '<span class="added-badge ' + (s.isNew ? 'pending' : 'existing') + '">' + (s.isNew ? 'Invite pending' : 'Added') + '</span>';
      h += '<button class="added-remove" onclick="removeSupplier(' + idx + ')" title="Remove">\u2715</button>';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';

  document.getElementById('main').innerHTML = h;
  restoreFocus(focusInfo);

  if (!focusInfo && !showInvitePanel) {
    var si = document.getElementById('search-input');
    if (si) si.focus();
  }
}

draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Event Builder — CROWN</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #F5F3EE; display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar { width: 200px; background: #1A1A1A; color: #fff; padding: 24px 0; flex-shrink: 0; display: flex; flex-direction: column; }
.sidebar-logo { font-size: 16px; font-weight: 800; letter-spacing: 0.12em; padding: 0 20px 28px; color: #fff; }
.sidebar-logo span { color: #1E8A3A; }
.sidebar-nav { flex: 1; }
.sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 13px; font-weight: 500; color: #888; cursor: pointer; transition: all 0.12s; border-left: 3px solid transparent; }
.sidebar-item:hover { color: #CCC; background: rgba(255,255,255,0.04); }
.sidebar-item.active { color: #fff; background: rgba(255,255,255,0.08); border-left-color: #1E8A3A; }
.sidebar-icon { font-size: 15px; width: 20px; text-align: center; }

/* ── MAIN ── */
.main { flex: 1; padding: 28px 32px; overflow-y: auto; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.top-bar-left { display: flex; align-items: center; gap: 16px; }
.page-title { font-size: 22px; font-weight: 800; color: #111; }
.view-tabs { display: flex; background: #fff; border: 1px solid #E0DDD6; border-radius: 8px; padding: 3px; gap: 3px; }
.vtab { padding: 7px 16px; border: none; background: transparent; font-size: 12px; font-weight: 600; color: #888; border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.12s; }
.vtab.on { background: #1A1A1A; color: #fff; }
.view-badge { font-size: 11px; font-weight: 600; color: #1E8A3A; border: 1px solid #C8E6C9; padding: 5px 14px; border-radius: 8px; background: #fff; }

.section-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-size: 24px; font-weight: 800; color: #111; }
.section-sub { font-size: 13px; color: #888; margin-top: 2px; }

/* ── SEARCH ── */
.search-bar { background: #fff; border: 1px solid #E0DDD6; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; position: relative; display: flex; align-items: center; gap: 10px; }
.search-bar input { flex: 1; border: none; outline: none; font-size: 14px; font-family: inherit; background: transparent; }
.search-icon { color: #BBB; font-size: 16px; }

.dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #E0DDD6; border-top: none; border-radius: 0 0 10px 10px; max-height: 320px; overflow-y: auto; z-index: 50; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
.dd-title { padding: 8px 16px 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: #CCC; background: #FAFAF8; }
.dd-item { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.08s; border-bottom: 1px solid #F5F3EE; }
.dd-item:last-child { border-bottom: none; }
.dd-item:hover { background: #F5FBF6; }
.dd-item-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.dd-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; flex-shrink: 0; }
.dd-avatar.active { background: #D6EAD9; color: #1E8A3A; }
.dd-avatar.invited { background: #FFE0B2; color: #E65100; }
.dd-name { font-size: 13px; font-weight: 600; color: #111; }
.dd-email { font-size: 11px; color: #888; }
.dd-right { display: flex; align-items: center; gap: 10px; }
.dd-co { font-size: 11px; color: #AAA; font-weight: 500; white-space: nowrap; }
.dd-empty { padding: 16px; text-align: center; font-size: 12px; color: #AAA; }

.badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 999px; display: inline-block; }
.badge-active { background: #E8F5E9; color: #1E8A3A; }
.badge-invited { background: #FFF3E0; color: #E65100; }

.warn-bar { background: #FFFDE7; border: 1px solid #FFD54F; border-radius: 10px; padding: 14px 16px; font-size: 13px; color: #7B5E00; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }

.btn { padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; transition: all 0.15s; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
.btn-dark { background: #1A1A1A; color: #fff; }
.btn-dark:hover { background: #333; }
.btn-s { background: #fff; color: #111; border: 1px solid #E0DDD6; padding: 7px 14px; font-size: 12px; }
.btn-s:hover { background: #F5F3EE; }
.btn-sm { padding: 6px 14px; font-size: 11px; }

/* ── TABLE ── */
.table-wrap { background: #fff; border: 1px solid #E0DDD6; border-radius: 12px; overflow: hidden; }
.table-header { display: grid; grid-template-columns: 2fr 2fr 1.2fr 100px 36px; padding: 10px 20px; border-bottom: 1px solid #E8E5E0; }
.th { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: #AAA; }
.table-row { display: grid; grid-template-columns: 2fr 2fr 1.2fr 100px 36px; padding: 12px 20px; align-items: center; border-bottom: 1px solid #F0EDE8; }
.table-row:last-child { border-bottom: none; }
.td { font-size: 13px; color: #555; }

.sup-cell { display: flex; align-items: center; gap: 10px; }
.sup-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; flex-shrink: 0; }
.sup-avatar.active { background: #D6EAD9; color: #1E8A3A; }
.sup-avatar.invited { background: #FFE0B2; color: #E65100; }
.sup-name { font-size: 13px; font-weight: 600; color: #111; }

.remove-btn { background: none; border: none; font-size: 14px; color: #CCC; cursor: pointer; padding: 4px 6px; border-radius: 4px; transition: all 0.12s; text-align: center; }
.remove-btn:hover { color: #E53935; background: #FFF5F5; }

.empty-state { text-align: center; padding: 28px; color: #AAA; font-size: 13px; }

.infobox { background: #E8F5E9; border: 1px solid #A8D5B5; border-radius: 10px; padding: 12px 16px; font-size: 12px; color: #1B5E2F; margin-bottom: 16px; line-height: 1.5; }

.flash { animation: flashIn 0.4s ease; }
@keyframes flashIn { 0% { background: #C8E6C9; } 100% { background: transparent; } }

.event-count { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: #888; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.event-count-badge { background: #1E8A3A; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 999px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .table-header, .table-row { grid-template-columns: 2fr 2fr 100px 36px; }
  .table-header .th:nth-child(3), .table-row .td:nth-child(3) { display: none; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">CR<span>&#9650;</span>WN</div>
  <div class="sidebar-nav">
    <div class="sidebar-item"><span class="sidebar-icon">&#9632;</span> Dashboard</div>
    <div class="sidebar-item active"><span class="sidebar-icon">&#9654;</span> eAuctions</div>
    <div class="sidebar-item" onclick="window.location='supplier_management.html'"><span class="sidebar-icon">&#9734;</span> Suppliers</div>
    <div class="sidebar-item"><span class="sidebar-icon">&#9744;</span> Trainings</div>
    <div class="sidebar-item"><span class="sidebar-icon">&#9786;</span> Users</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="page-title">Event Builder</div>
      <div class="view-tabs">
        <button class="vtab" id="tab-buyer" onclick="switchRole('buyer')">Buyer View</button>
        <button class="vtab on" id="tab-admin" onclick="switchRole('admin')">Admin View</button>
      </div>
    </div>
    <span class="view-badge" id="role-badge">Admin view</span>
  </div>

  <div class="section-header">
    <div>
      <div class="section-title">Add suppliers to event</div>
      <div class="section-sub">Search by email to find suppliers and add them to this e-auction</div>
    </div>
  </div>

  <div id="buyer-info"></div>
  <div id="main-content"></div>
</div>

<script>
// ── DATA (synced with supplier_management) ──
var companies = [
  { id:1, name:'Acme Corporation', contacts:[
    {id:11, name:'Hans Braun', email:'hans@acme-corp.de', initials:'HB', status:'active'},
    {id:12, name:'Petra Wolf', email:'petra@acme-corp.de', initials:'PW', status:'active'}
  ]},
  { id:2, name:'Bosch Automotive', contacts:[
    {id:21, name:'Klaus Richter', email:'klaus@bosch-auto.de', initials:'KR', status:'active'},
    {id:22, name:'Eva Fischer', email:'eva@bosch-auto.de', initials:'EF', status:'active'},
    {id:23, name:'Max Bauer', email:'max@bosch-auto.de', initials:'MB', status:'invited'}
  ]},
  { id:3, name:'Continental AG', contacts:[
    {id:31, name:'Anna M\u00FCller', email:'anna@continental.de', initials:'AM', status:'active'},
    {id:32, name:'Stefan Klein', email:'stefan@continental.de', initials:'SK', status:'invited'}
  ]},
  { id:4, name:'Crown Materials', contacts:[
    {id:41, name:'James Wilson', email:'james@crownmat.co.uk', initials:'JW', status:'active'}
  ]},
  { id:5, name:'Delta Electronics', contacts:[
    {id:51, name:'Wei Chen', email:'wei@delta-elec.tw', initials:'WC', status:'invited'},
    {id:52, name:'Li Zhang', email:'li@delta-elec.tw', initials:'LZ', status:'invited'}
  ]},
  { id:6, name:'Maersk', contacts:[
    {id:61, name:'Erik Jensen', email:'e.jensen@maersk.com', initials:'EJ', status:'active'},
    {id:62, name:'Sofia Andersen', email:'s.andersen@maersk.com', initials:'SA', status:'invited'},
    {id:63, name:'Lars Nielsen', email:'l.nielsen@maersk.com', initials:'LN', status:'active'}
  ]},
  { id:7, name:'Nestl\u00E9 Supply', contacts:[
    {id:71, name:'Pierre Blanc', email:'p.blanc@nestle.com', initials:'PB', status:'active'}
  ]},
  { id:8, name:'Unilever Partners', contacts:[
    {id:81, name:'Jan de Vries', email:'j.devries@unilever.com', initials:'JV', status:'active'},
    {id:82, name:'Emma Bakker', email:'e.bakker@unilever.com', initials:'EB', status:'active'}
  ]}
];

function getAllAccounts() {
  var list = [];
  companies.forEach(function(co) {
    co.contacts.forEach(function(c) {
      list.push({ id: c.id, name: c.name, email: c.email, initials: c.initials, company: co.name, status: c.status || 'active' });
    });
  });
  return list;
}

// ── STATE ──
var role = 'admin';
var query = '';
var dropdownOpen = false;
var eventSuppliers = [];
var lastAddedId = null;

// ── HELPERS ──
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function isAlreadyAdded(email) { return eventSuppliers.some(function(s){ return s.email.toLowerCase()===email.toLowerCase(); }); }

function getDropdownItems() {
  var all = getAllAccounts().filter(function(a){ return !isAlreadyAdded(a.email); });
  if (query.length < 1) return all;
  var q = query.toLowerCase();
  return all.filter(function(a){ return a.email.toLowerCase().indexOf(q) > -1; });
}

// ── ACTIONS ──
function addSupplier(contactId) {
  var all = getAllAccounts();
  var r = all.find(function(a){ return a.id === contactId; });
  if (r && !isAlreadyAdded(r.email)) {
    eventSuppliers.push({ id: r.id, name: r.name, email: r.email, initials: r.initials, company: r.company, status: r.status });
    lastAddedId = r.id;
    query = ''; dropdownOpen = false;
    draw();
    setTimeout(function() { lastAddedId = null; }, 600);
    var si = document.getElementById('search-input');
    if (si) si.focus();
  }
}

function removeSupplier(idx) { eventSuppliers.splice(idx, 1); draw(); }

function switchRole(r) {
  if (r === role) return;
  role = r;
  document.getElementById('tab-admin').className = 'vtab' + (r === 'admin' ? ' on' : '');
  document.getElementById('tab-buyer').className = 'vtab' + (r === 'buyer' ? ' on' : '');
  document.getElementById('role-badge').textContent = r === 'admin' ? 'Admin view' : 'Buyer view';
  draw();
}

var searchTimer = null;
function setQuery(v) {
  query = v; dropdownOpen = true;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() { draw(); }, 100);
}

function saveFocus() {
  var el = document.activeElement;
  if (!el || !el.id) return null;
  return { id: el.id, start: el.selectionStart, end: el.selectionEnd };
}
function restoreFocus(info) {
  if (!info) return;
  var el = document.getElementById(info.id);
  if (!el) return;
  el.focus();
  if (typeof el.setSelectionRange === 'function' && info.start != null) {
    try { el.setSelectionRange(info.start, info.end); } catch(e) {}
  }
}

var suppressFocusOpen = false;
document.addEventListener('mousedown', function(e) {
  if (!e.target.closest('.search-bar') && !e.target.closest('.dropdown')) {
    if (dropdownOpen) {
      dropdownOpen = false; suppressFocusOpen = true;
      draw();
      setTimeout(function() { suppressFocusOpen = false; }, 200);
    }
  }
});

// ── DRAW ──
function draw() {
  var focusInfo = saveFocus();
  var isAdmin = role === 'admin';
  var items = getDropdownItems();
  var h = '';

  if (!isAdmin) {
    document.getElementById('buyer-info').innerHTML = '<div class="infobox">Adding suppliers on behalf of <strong>Bonduelle</strong>.</div>';
  } else {
    document.getElementById('buyer-info').innerHTML = '';
  }

  // ─── SEARCH ───
  h += '<div class="search-bar">';
  h += '<span class="search-icon">&#128269;</span>';
  h += '<input id="search-input" placeholder="Paste supplier email address..." value="' + esc(query) + '" oninput="setQuery(this.value)" onfocus="if(!suppressFocusOpen){dropdownOpen=true;draw()}" autocomplete="off" />';

  if (dropdownOpen) {
    h += '<div class="dropdown">';
    if (items.length > 0) {
      h += '<div class="dd-title">' + items.length + ' supplier account' + (items.length !== 1 ? 's' : '') + '</div>';
      items.forEach(function(a) {
        var st = a.status === 'invited' ? 'invited' : 'active';
        h += '<div class="dd-item" onmousedown="event.preventDefault();addSupplier(' + a.id + ')">';
        h += '<div class="dd-item-left">';
        h += '<div class="dd-avatar ' + st + '">' + a.initials + '</div>';
        h += '<div><div class="dd-name">' + esc(a.name) + '</div>';
        h += '<div class="dd-email">' + esc(a.email) + '</div></div>';
        h += '</div>';
        h += '<div class="dd-right">';
        h += '<div class="dd-co">' + esc(a.company) + '</div>';
        if (st === 'invited') h += ' <span class="badge badge-invited">Pending</span>';
        h += '</div>';
        h += '</div>';
      });
    } else {
      h += '<div class="dd-empty">No account matches \u201C' + esc(query) + '\u201D</div>';
    }
    h += '</div>';
  }
  h += '</div>';

  // No results warning
  if (query.length >= 2 && items.length === 0 && !dropdownOpen) {
    h += '<div class="warn-bar">';
    h += '<div><strong>No account found</strong> for \u201C' + esc(query) + '\u201D \u2014 invite them first in Supplier Management.</div>';
    h += '<a href="supplier_management.html" class="btn btn-dark btn-sm">Go to Suppliers \u2192</a>';
    h += '</div>';
  }

  // ─── EVENT SUPPLIERS TABLE ───
  h += '<div class="event-count">Suppliers in this event ';
  if (eventSuppliers.length > 0) h += '<span class="event-count-badge">' + eventSuppliers.length + '</span>';
  h += '</div>';

  h += '<div class="table-wrap">';
  if (eventSuppliers.length === 0) {
    h += '<div class="empty-state">No suppliers added yet. Search by email above to find and add them.</div>';
  } else {
    h += '<div class="table-header">';
    h += '<div class="th">Supplier</div><div class="th">Email</div><div class="th">Company</div><div class="th">Status</div><div class="th"></div>';
    h += '</div>';

    eventSuppliers.forEach(function(s, idx) {
      var isFlash = lastAddedId && lastAddedId === s.id;
      var st = s.status === 'invited' ? 'invited' : 'active';
      h += '<div class="table-row' + (isFlash ? ' flash' : '') + '">';
      h += '<div class="sup-cell"><div class="sup-avatar ' + st + '">' + s.initials + '</div><div class="sup-name">' + esc(s.name) + '</div></div>';
      h += '<div class="td">' + esc(s.email) + '</div>';
      h += '<div class="td">' + esc(s.company) + '</div>';
      h += '<div><span class="badge badge-' + st + '">' + (st === 'active' ? 'Added' : 'Pending') + '</span></div>';
      h += '<div><button class="remove-btn" onclick="removeSupplier(' + idx + ')" title="Remove">\u2715</button></div>';
      h += '</div>';
    });
  }
  h += '</div>';

  document.getElementById('main-content').innerHTML = h;
  restoreFocus(focusInfo);

  if (!focusInfo) {
    var si = document.getElementById('search-input');
    if (si) si.focus();
  }
}

draw();
</script>
</body>
</html>
